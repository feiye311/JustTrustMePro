name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version tag
        id: check_version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oP '^v[0-9]+\.[0-9]+\.[0-9]+')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "CREATE_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "CREATE_RELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.check_version.outputs.CREATE_RELEASE == 'true'
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: steps.check_version.outputs.CREATE_RELEASE == 'true'
        run: chmod +x ./gradlew

      - name: Build Debug APK
        if: steps.check_version.outputs.CREATE_RELEASE == 'true'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: steps.check_version.outputs.CREATE_RELEASE == 'true'
        run: ./gradlew assembleRelease

      - name: Get commit message
        if: steps.check_version.outputs.CREATE_RELEASE == 'true'
        id: commit_msg
        run: echo "MSG=$(git log -1 --pretty=%B | head -1)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_version.outputs.CREATE_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.check_version.outputs.VERSION }}
          name: Release ${{ steps.check_version.outputs.VERSION }}
          body: ${{ steps.commit_msg.outputs.MSG }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
